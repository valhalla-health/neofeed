<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#ffffff" />
<title>NeoFeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    /* surfaces — cool warm-gray with subtle clinical tone */
    --bg:        oklch(98.5% 0.004 230);
    --bg-2:      oklch(96.5% 0.005 230);
    --surface:   #ffffff;
    --surface-2: oklch(99% 0.003 230);
    --line:      oklch(91% 0.006 230);
    --line-2:    oklch(94% 0.005 230);

    /* type */
    --ink:       oklch(22% 0.015 250);
    --ink-2:     oklch(38% 0.015 250);
    --ink-3:     oklch(55% 0.01 250);
    --ink-4:     oklch(72% 0.008 250);

    /* brand — clinical deep teal */
    --brand:     oklch(46% 0.085 215);
    --brand-2:   oklch(38% 0.09 215);
    --brand-bg:  oklch(96% 0.020 215);
    --brand-line:oklch(85% 0.05 215);

    /* status — restrained traffic-light, only for clinical severity */
    --crit:      oklch(54% 0.20 22);
    --crit-bg:   oklch(96.5% 0.03 22);
    --crit-line: oklch(85% 0.08 22);

    --warn:      oklch(63% 0.16 65);
    --warn-bg:   oklch(96.5% 0.04 75);
    --warn-line: oklch(86% 0.10 70);

    --ok:        oklch(52% 0.12 155);
    --ok-bg:     oklch(96% 0.03 155);
    --ok-line:   oklch(86% 0.07 155);

    --info:      oklch(50% 0.10 240);

    /* radii + shadow */
    --r-sm: 6px;
    --r:    10px;
    --r-lg: 14px;
    --shadow-card: 0 1px 0 oklch(92% 0.005 230 / .6), 0 1px 2px oklch(20% 0.01 230 / .04);
    --shadow-pop:  0 4px 14px oklch(20% 0.01 230 / .10), 0 1px 2px oklch(20% 0.01 230 / .06);

    --rail-w: 232px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.45 "IBM Plex Sans", "Sarabun", "IBM Plex Sans Thai", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .mono, .num { font-family: "IBM Plex Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  button { font: inherit; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }

  /* ── Touch: remove 300ms delay + suppress native tap highlight everywhere ── */
  button, a, .btn, .clickable, .preset-chip, .seg button,
  .card-h, .bnav-item, .rail-item, .switch-patient, .icon-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* ============ APP SHELL ============ */
  .app {
    display: grid;
    grid-template-columns: var(--rail-w) 1fr;
    grid-template-rows: var(--header-h) 1fr;
    height: 100vh;
    height: 100dvh; /* iOS Safari: excludes collapsing browser chrome */
    overflow: hidden; /* shell never scrolls — only .work does */
  }
  .topbar {
    grid-column: 1 / -1;
    grid-row: 1;
    z-index: 30;
    display: flex; align-items: center; gap: 16px;
    padding: 0 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 30;
  }
  .brandmark {
    display: flex; align-items: center; gap: 10px;
    width: calc(var(--rail-w) - 18px);
    font-weight: 600; letter-spacing: -0.01em;
  }
  .brandmark .logo {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--brand); color: #fff;
    display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
    box-shadow: inset 0 -2px 0 oklch(30% 0.08 215 / .35);
  }
  .brandmark .name { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .brandmark .logo {
    background: linear-gradient(135deg, var(--brand) 0%, oklch(36% 0.09 215) 100%);
    box-shadow: inset 0 -2px 0 oklch(28% 0.08 215 / .4), 0 2px 8px oklch(46% 0.085 215 / .25);
  }

  .topbar .spacer { flex: 1; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface-2);
    font-size: 12px;
    color: var(--ink-2);
  }
  .pill .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--ok); }
  .pill.alert .dot { background: var(--crit); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }

  .icon-btn {
    width: 32px; height: 32px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--surface);
    display: inline-grid; place-items: center; cursor: pointer;
    color: var(--ink-2);
  }
  .icon-btn:hover { background: var(--bg-2); color: var(--ink); }

  .user {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 4px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
  }
  .user .av {
    width: 26px; height: 26px; border-radius: 999px;
    background: oklch(85% 0.06 215); color: var(--brand-2);
    display: grid; place-items: center; font-weight: 600; font-size: 11px;
  }
  .user .name { font-size: 12px; font-weight: 500; }
  .user .role { font-size: 10px; color: var(--ink-3); }

  /* ============ NAV RAIL ============ */
  .rail {
    background: var(--surface);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
    padding: 14px 12px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .rail-section { font-size: 10px; font-weight: 600; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 8px 6px; }
  .rail-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-sm);
    color: var(--ink-2);
    cursor: pointer;
    font-size: 13px;
    border: 1px solid transparent;
    user-select: none;
  }
  .rail-item:hover { background: var(--bg-2); color: var(--ink); }
  .rail-item.active {
    background: var(--brand-bg);
    color: var(--brand-2);
    border-color: var(--brand-line);
    font-weight: 500;
  }
  .rail-item svg { flex-shrink: 0; }
  .rail-item .count {
    margin-left: auto;
    font-size: 11px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    padding: 0 6px;
    border-radius: 999px;
    color: var(--ink-3);
  }
  .rail-item.active .count { background: #fff; border-color: var(--brand-line); color: var(--brand-2); }
  .rail-item.crit .count { background: var(--crit-bg); border-color: var(--crit-line); color: var(--crit); }

  .rail-foot {
    margin-top: auto; padding: 10px 8px; font-size: 11px; color: var(--ink-3);
    border-top: 1px solid var(--line-2);
  }
  .rail-foot .conn { display: flex; align-items: center; gap: 6px; }
  .rail-foot .conn .dot { width: 6px; height: 6px; background: var(--ok); border-radius: 999px; }

  /* ============ WORKSPACE ============ */
  .work { overflow: auto; overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; }
  .work-inner { padding: 18px 22px 60px; max-width: 1480px; }

  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
  .page-head h1 {
    margin: 0; font-size: 20px; letter-spacing: -0.02em; font-weight: 600;
  }
  .page-head .sub { color: var(--ink-3); font-size: 13px; margin-top: 2px; }

  /* generic card */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow-card);
    transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
  }
  /* Card "lifts" when you're actively filling it in — no JS needed */
  .card:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px oklch(46% 0.085 215 / .10),
                0 4px 12px oklch(20% 0.01 230 / .07);
  }
  .card-h {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1.5px solid var(--line-2);
    font-weight: 600; font-size: 14px;
    letter-spacing: -0.01em;
  }
  .card-h .h-meta { margin-left: auto; font-size: 11.5px; color: var(--ink-3); font-weight: 400; }
  .card-b { padding: 14px; }

  /* ============ PATIENT HEADER STRIP ============ */
  .patient-strip {
    display: grid;
    grid-template-columns: minmax(200px, 1.5fr) minmax(0,1fr) minmax(0,2.4fr) minmax(0,1fr) minmax(0,0.85fr) minmax(0,0.65fr);
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow-card);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .patient-strip > div { padding: 10px 14px; border-right: 1px solid var(--line-2); display: flex; flex-direction: column; }
  .patient-strip > div:last-child { border-right: 0; }
  /* fixed-height label row → all .val lines align at the same vertical position */
  .patient-strip .lbl { font-size: 10px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; height: 28px; display: flex; align-items: flex-end; padding-bottom: 2px; }
  .patient-strip .val { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin-top: 1px; line-height: 1.2; }
  .patient-strip .val.num { font-family: "IBM Plex Mono", monospace; font-weight: 500; }
  .patient-strip .sub { font-size: 11px; color: var(--ink-3); margin-top: 3px; font-weight: 500; }
  .patient-strip .lead { background: linear-gradient(180deg, var(--brand-bg), #fff 90%); }
  .patient-strip .pid {
    display: flex; align-items: center; gap: 10px;
  }
  .patient-strip .pid .id { font-family: "IBM Plex Mono", monospace; font-size: 15px; font-weight: 600; }
  .patient-strip .pid .bed { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .patient-strip .switch {
    margin-top: 8px;
    font-size: 13px;
    color: var(--brand);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* ============ LAYOUT for calculator page ============ */
  .calc-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr) minmax(360px, 0.95fr);
    gap: 14px;
  }
  @media (max-width: 1280px) {
    .calc-grid { grid-template-columns: 1fr 1fr; }
    .calc-grid .col-dash { grid-column: 1 / -1; }
  }
  /* Step 2 metric tiles: 5-col → 3+2 on narrow screens */
  @media (max-width: 1100px) {
    .metric-tiles-4 { grid-template-columns: repeat(3,1fr) !important; }
  }
  @media (max-width: 720px) {
    .metric-tiles-4 { grid-template-columns: 1fr 1fr !important; }
  }

  /* ============ INPUTS ============ */
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field > label {
    font-size: 12px; color: var(--ink-2); font-weight: 600;
    letter-spacing: 0.01em;
  }
  .field > label .unit { color: var(--ink-3); font-weight: 400; margin-left: 4px; }
  .inp, .sel {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--line);
    background: var(--surface);
    border-radius: 8px;
    font-size: 14px;
    color: var(--ink);
    min-height: 44px;   /* touch-friendly tap target */
    transition: border-color .12s, box-shadow .12s, background .12s;
  }
  .inp:focus, .sel:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px oklch(46% 0.085 215 / .15);
    background: oklch(99.5% 0.007 215);
  }
  .inp.num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .inp-suffix {
    position: relative;
  }
  .inp-suffix .inp { padding-right: 36px; }
  .inp-suffix .suffix {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: var(--ink-3); pointer-events: none;
    font-family: "IBM Plex Mono", monospace;
  }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* trend graph: compact x-axis seg (smaller than default .seg) */
  .trend-xaxis-seg { padding: 2px !important; border-width: 1px !important; }
  .trend-xaxis-seg button { padding: 6px 14px !important; font-size: 12px !important; min-height: 28px !important; border-radius: 6px !important; }
  .trend-xaxis-seg button:not(.on) { color: var(--ink-3); }

  /* trend graph: chip hover state (desktop) */
  .trend-chip:hover { transform: translateY(-1px); }

  /* segmented control */
  .seg {
    display: inline-flex; padding: 3px;
    border: 1.5px solid var(--line); border-radius: 8px;
    background: var(--bg-2); gap: 2px;
  }
  .seg button {
    border: 0; background: transparent; padding: 9px 16px;
    font-size: 13px; color: var(--ink-2);
    line-height: 1.2; white-space: nowrap;
    border-radius: 6px; cursor: pointer;
    transition: background .12s, color .12s;
    font-family: inherit;
  }
  .seg button:hover:not(.on) { background: oklch(94% 0.006 215); color: var(--ink); }
  .seg button.on {
    background: var(--brand); color: #fff;
    box-shadow: 0 1px 4px oklch(46% 0.085 215 / .35);
    font-weight: 600;
  }

  /* sub-section header inside cards */
  .sub-h {
    font-size: 11px; font-weight: 600; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase;
    margin: 14px 0 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .sub-h:first-child { margin-top: 0; }
  .sub-h .badge {
    font-size: 10px; padding: 1px 6px; border-radius: 999px;
    background: var(--bg-2); border: 1px solid var(--line); color: var(--ink-3);
    font-weight: 500; letter-spacing: 0;
  }

  /* ============ DASHBOARD METRIC TILES ============ */
  .metric {
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 12px 14px;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .metric .lbl {
    font-size: 11px; color: var(--ink-3); font-weight: 500; letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 6px;
  }
  .metric .lbl .help {
    width: 14px; height: 14px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--ink-3);
    display: inline-grid; place-items: center; font-size: 9px; cursor: help;
  }
  .metric .val {
    font-family: "IBM Plex Mono", monospace;
    font-size: 30px; font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin: 6px 0 2px;
  }
  .metric .val .u { font-size: 11px; color: var(--ink-3); margin-left: 4px; font-weight: 400; }
  .metric .target {
    font-size: 11px; color: var(--ink-3); display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .metric .target .range { font-family: "IBM Plex Mono", monospace; }

  /* status accent */
  .metric.s-ok    { border-color: var(--ok-line); background: linear-gradient(180deg, var(--ok-bg), var(--surface) 60%); }
  .metric.s-warn  { border-color: var(--warn-line); background: linear-gradient(180deg, var(--warn-bg), var(--surface) 60%); }
  .metric.s-crit  { border-color: var(--crit-line); background: linear-gradient(180deg, var(--crit-bg), var(--surface) 60%); }
  .metric.s-empty { opacity: .85; }

  .metric .stripe {
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .metric.s-ok    .stripe { background: var(--ok); }
  .metric.s-warn  .stripe { background: var(--warn); }
  .metric.s-crit  .stripe { background: var(--crit); }
  .metric.s-empty .stripe { background: var(--line); }

  /* meter bar */
  .meter {
    position: relative;
    height: 6px; background: var(--bg-2);
    border-radius: 999px; margin: 8px 0 4px;
    overflow: visible;
  }
  .meter .range-bg {
    position: absolute; top: 0; bottom: 0;
    background: oklch(90% 0.05 215);
    border-radius: 999px;
    opacity: .7;
  }
  .meter .needle {
    position: absolute; top: -3px;
    width: 3px; height: 12px;
    border-radius: 2px;
    background: var(--ink);
    transform: translateX(-50%);
  }
  .meter.s-warn .needle { background: var(--warn); }
  .meter.s-crit .needle { background: var(--crit); }
  .meter.s-ok   .needle { background: var(--ok); }

  /* ============ ALERTS ============ */
  .alert-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--r-sm);
    border: 1px solid var(--line);
    background: var(--surface);
    font-size: 12.5px;
  }
  .alert-row + .alert-row { margin-top: 6px; }
  .alert-row .ico {
    width: 22px; height: 22px; border-radius: 999px;
    display: grid; place-items: center; flex-shrink: 0;
    font-size: 12px; font-weight: 600;
  }
  .alert-row.crit { border-color: var(--crit-line); background: var(--crit-bg); }
  .alert-row.crit .ico { background: var(--crit); color: #fff; }
  .alert-row.crit .title { color: var(--crit); }
  .alert-row.warn { border-color: var(--warn-line); background: var(--warn-bg); }
  .alert-row.warn .ico { background: var(--warn); color: #fff; }
  .alert-row.warn .title { color: oklch(40% 0.13 65); }
  .alert-row.info { border-color: var(--brand-line); background: var(--brand-bg); }
  .alert-row.info .ico { background: var(--brand); color: #fff; }
  .alert-row.info .title { color: var(--brand-2); }
  .alert-row .title { font-weight: 600; }
  .alert-row .body { color: var(--ink-2); margin-top: 1px; }
  .alert-row .meta { color: var(--ink-3); font-size: 11px; margin-top: 4px; font-family: "IBM Plex Mono", monospace; }

  /* ============ BUTTONS ============ */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--line);
    background: var(--surface);
    cursor: pointer; font-size: 13.5px; color: var(--ink);
    font-family: inherit; font-weight: 500;
    transition: background .12s, border-color .12s, box-shadow .12s, transform .1s;
    min-height: 40px;
  }
  .btn:hover { background: var(--bg-2); border-color: oklch(80% 0.01 230); }
  .btn:active { transform: scale(0.98); }
  .btn.primary {
    background: var(--brand); color: #fff; border-color: var(--brand-2);
    box-shadow: 0 2px 0 oklch(35% 0.09 215 / .4), 0 4px 12px oklch(46% 0.085 215 / .25);
  }
  .btn.primary:hover { background: var(--brand-2); box-shadow: 0 2px 0 oklch(28% 0.09 215 / .5), 0 6px 18px oklch(46% 0.085 215 / .35); }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: var(--bg-2); }
  .btn.sm { padding: 5px 10px; font-size: 12px; min-height: 32px; }

  /* ============ PRESET CHIPS ============ */
  /* Quick-fill value chips — tap to populate the field instantly */
  .preset-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
  .preset-chip {
    padding: 4px 12px; border-radius: 999px; font-size: 12px;
    cursor: pointer; border: 1.5px solid var(--line-2);
    background: var(--bg-2); color: var(--ink-3);
    font-family: "IBM Plex Mono", monospace; font-weight: 500;
    transition: all .1s; line-height: 1.2;
  }
  .preset-chip:hover  { border-color: var(--brand); color: var(--brand-2); background: var(--brand-bg); }
  .preset-chip:active { transform: scale(0.95); }
  .preset-chip.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand-2); font-weight: 700; }

  /* ============ ACCORDION STEP CARDS ============ */
  .card-h.clickable { cursor: pointer; user-select: none; }
  .card-h.clickable { transition: background 0.12s ease; }
  .card-h.clickable:hover  { background: oklch(96.5% 0.018 215); }
  .card-h.clickable:active { background: oklch(94.5% 0.025 215); }
  .step-summary {
    flex: 1; margin-left: 8px; display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap; overflow: hidden;
  }
  .step-summary-chip {
    font-family: "IBM Plex Mono", monospace; font-size: 11px;
    color: var(--ink-2); background: var(--bg-2);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 7px; white-space: nowrap;
  }
  .step-dot {
    width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0;
    transition: background .2s;
  }
  .step-dot.done    { background: var(--ok); box-shadow: 0 0 0 2px oklch(52% 0.12 155 / .2); }
  .step-dot.partial { background: var(--warn); }
  .step-dot.empty   { background: var(--line); border: 1.5px solid var(--line-2); }

  /* ============ TABLES ============ */
  table.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.tbl th, table.tbl td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line-2); }
  table.tbl th { font-size: 10.5px; color: var(--ink-3); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; background: var(--bg-2); }
  table.tbl tr:hover td { background: var(--bg-2); }
  table.tbl td.num { font-family: "IBM Plex Mono", monospace; }

  /* status chip */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 3px 9px;
    border-radius: 999px; white-space: nowrap;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-2);
    font-weight: 500;
  }
  .chip .d { display: none; }
  .chip.ok   { color: var(--ok); border-color: var(--ok-line); background: var(--ok-bg); }
  .chip.ok .d { background: var(--ok); }
  .chip.warn { color: oklch(45% 0.13 65); border-color: var(--warn-line); background: var(--warn-bg); }
  .chip.warn .d { background: var(--warn); }
  .chip.crit { color: var(--crit); border-color: var(--crit-line); background: var(--crit-bg); }
  .chip.crit .d { background: var(--crit); }
  .chip.brand { color: var(--brand); border-color: var(--brand-line); background: var(--brand-bg); }
  .chip.brand .d { background: var(--brand); }

  /* ============ PATIENT PICKER (modal-style) ============ */
  .picker-backdrop {
    position: fixed; inset: 0; background: oklch(20% 0.01 230 / .35);
    z-index: 50; display: grid; place-items: center;
    backdrop-filter: blur(2px);
  }
  .picker {
    width: min(720px, 92vw); max-height: 80vh; overflow: auto;
    background: var(--surface); border-radius: var(--r-lg);
    box-shadow: var(--shadow-pop); border: 1px solid var(--line);
  }
  .picker-h {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px; border-bottom: 1px solid var(--line-2);
  }
  .picker-h input {
    flex: 1; border: 0; outline: 0; font-size: 14px; background: transparent;
  }

  /* ============ DISCLAIMER ============ */
  .disclaimer-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: oklch(98% 0.018 75);
    border: 1px solid oklch(90% 0.07 75);
    color: oklch(38% 0.10 65);
    border-radius: var(--r-sm);
    font-size: 12px;
    margin-bottom: 14px;
  }

  /* FENTON */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--ink-2); }
  .legend .s { display: inline-flex; align-items: center; gap: 6px; }
  .legend .s .b { width: 18px; height: 3px; border-radius: 2px; }

  /* small kbd-style */
  .kbd { font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 1px 5px; border: 1px solid var(--line); border-radius: 4px; background: var(--surface-2); color: var(--ink-2); }

  /* switch-patient — top-bar quick picker */
  .switch-patient {
    display: inline-flex; align-items: center; gap: 10px;
    height: 36px; padding: 0 10px 0 8px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; cursor: pointer;
    transition: border-color .12s ease, background .12s ease, box-shadow .12s ease;
  }
  .switch-patient:hover { border-color: var(--brand); background: var(--brand-bg); box-shadow: 0 1px 2px rgba(15,23,42,.04); }
  .switch-patient .sp-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 6px; background: var(--bg-2);
  }
  .switch-patient .sp-label { font-size: 13px; color: var(--ink); font-weight: 500; letter-spacing: -.01em; }
  .switch-patient .sp-kbd {
    font-family: "IBM Plex Mono", monospace; font-size: 10.5px; color: var(--ink-3);
    padding: 1px 5px; border: 1px solid var(--line); border-radius: 4px; background: var(--bg-2);
  }


  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: oklch(88% 0.005 230); border-radius: 999px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: oklch(80% 0.005 230); }

  /* sparkline */
  .spark { stroke: var(--brand); stroke-width: 1.5; fill: none; }
  .spark-pt { fill: var(--brand); }

  /* mini progress to percentile */
  .pct-band { display: inline-flex; align-items: center; gap: 4px; }
  .pct-band .bb { width: 36px; height: 6px; background: var(--bg-2); border-radius: 999px; overflow: hidden; position: relative; }
  .pct-band .bb i { position: absolute; left: 0; top: 0; bottom: 0; background: var(--brand); border-radius: 999px; }

  /* ============ LOADING SPINNER (sync dot) ============ */
  @keyframes spin { to { transform: rotate(360deg); } }
  .dot-spin {
    display: inline-block;
    border: 1.5px solid oklch(88% 0.06 65 / .5);
    border-top-color: var(--warn);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    background: transparent !important;
  }

  /* ============ ACCORDION TRANSITION ============ */
  .accordion-body {
    overflow: hidden;
    max-height: 0;
    visibility: hidden;
    transition: max-height 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                visibility 0s linear 0.28s;
  }
  .accordion-body.open {
    max-height: 1800px;
    visibility: visible;
    transition: max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                visibility 0s linear 0s;
  }

  /* ============ BOTTOM NAV (mobile) ============ */
  .bottom-nav { display: none; }

  /* ============ LOGIN SCREEN ============ */
  .login-wrap {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(ellipse 90% 70% at 50% 35%,
      oklch(94% 0.022 215) 0%,
      oklch(97.5% 0.008 215) 55%,
      oklch(98.5% 0.004 215) 100%);
    padding: 40px 24px 96px;
    gap: 0;
    overflow-y: auto;
  }

  .login-logo-mark {
    width: 96px; height: 96px;
    border-radius: 28px;
    background: linear-gradient(145deg, oklch(50% 0.09 215), oklch(30% 0.09 215));
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 20px 52px oklch(46% 0.085 215 / .24),
      0 4px 12px oklch(46% 0.085 215 / .12),
      inset 0 -3px 0 oklch(22% 0.07 215 / .5);
    margin-bottom: 32px;
    flex-shrink: 0;
  }

  .login-app-name {
    font-size: 60px;
    font-weight: 700;
    letter-spacing: -0.045em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 16px;
  }

  .login-tagline {
    font-size: 17px;
    color: var(--ink-3);
    line-height: 1.6;
    font-weight: 400;
    margin-bottom: 48px;
  }

  .login-btn-area {
    width: 100%;
    max-width: 320px;
    position: relative;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0;
  }

  .login-error {
    width: 100%; max-width: 320px;
    padding: 11px 14px;
    background: var(--crit-bg);
    border: 1px solid var(--crit-line);
    border-radius: 10px;
    color: var(--crit);
    font-size: 13px;
    margin-top: 14px;
  }

  .login-alt-link {
    margin-top: 18px;
    font-size: 13px;
    color: var(--ink-3);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color .15s;
  }
  .login-alt-link:hover { color: var(--brand); }

  .login-back-link {
    display: flex; align-items: center; gap: 5px;
    font-size: 12.5px; color: var(--ink-3);
    background: none; border: none; cursor: pointer;
    margin-bottom: 18px; padding: 2px 4px;
    border-radius: 6px; transition: color .15s;
    align-self: flex-start;
  }
  .login-back-link:hover { color: var(--brand); }

  .login-form-wrap {
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
  }

  .login-contact {
    position: absolute;
    bottom: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .login-contact-link {
    font-size: 12px; color: var(--ink-3);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(4px);
    transition: all .15s;
    letter-spacing: 0;
  }
  .login-contact-link:hover {
    color: var(--brand); border-color: var(--brand-line);
    background: var(--brand-bg);
  }
  .login-footer {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-4);
    text-transform: uppercase;
  }

  @media (max-width: 767px) {
    .login-logo-mark { width: 76px; height: 76px; border-radius: 22px; margin-bottom: 24px; }
    .login-app-name  { font-size: 48px; margin-bottom: 12px; }
    .login-tagline   { font-size: 15px; margin-bottom: 40px; }
    .login-footer    { bottom: env(safe-area-inset-bottom, 20px); }
  }


  /* trend graph: vertical dividers between Latest / Target / Δ stats (desktop) */
  .trend-latest > div { position: relative; padding-right: 28px; }
  .trend-latest > div:not(:last-child)::after {
    content: ""; position: absolute; right: 0; top: 4px; bottom: 4px;
    width: 1px; background: var(--line-2);
  }
  .trend-latest > div:last-child { padding-right: 0; }

  /* ============ PATIENT REGISTRY ============ */
  .patient-card-list { display: none; }
  .patient-table     { display: block; }

  .reg-stats { display: flex; gap: 8px; margin-bottom: 16px; }
  .reg-stat {
    flex: 1; background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); padding: 10px 14px 10px 16px;
    display: flex; flex-direction: row; align-items: center; gap: 12px;
    box-shadow: var(--shadow-card); border-left: 3px solid var(--line);
  }
  .reg-stat-val {
    font-family: "IBM Plex Mono", monospace; font-size: 24px; font-weight: 600;
    letter-spacing: -0.03em; line-height: 1; color: var(--ink); flex-shrink: 0;
  }
  .reg-stat-lbl { font-size: 11px; color: var(--ink-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.3; }
  .reg-stat.s-ok    { border-left-color: var(--ok); }
  .reg-stat.s-warn  { border-left-color: var(--warn); }
  .reg-stat.s-crit  { border-left-color: var(--crit); }
  .reg-stat.s-brand { border-left-color: var(--brand); }
  .reg-stat.s-ok   .reg-stat-val { color: var(--ok); }
  .reg-stat.s-warn .reg-stat-val { color: var(--warn); }
  .reg-stat.s-crit .reg-stat-val { color: var(--crit); }
  .reg-stat.s-brand .reg-stat-val { color: var(--brand); }

  .reg-filter { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
  .reg-filter .reg-search { position: relative; flex: 1; max-width: 400px; }
  .reg-filter .reg-search .inp { padding-left: 36px; height: 38px; }
  .reg-filter .reg-search .s-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; }

  .patient-table table.tbl td { vertical-align: middle; padding-top: 9px; padding-bottom: 9px; }
  .patient-table table.tbl tr.p-active td { background: var(--brand-bg); }
  .patient-table table.tbl tr:hover td { background: var(--bg-2); }
  .patient-table table.tbl tr.p-active:hover td { background: oklch(94% 0.025 215); }

  /* ============ MOBILE / DESKTOP TABLE SWAP ============ */

  /* ============ TABLET: 768–1199px — icon-only rail ============ */
  @media (min-width: 768px) and (max-width: 1199px) {
    :root { --rail-w: 60px; }
    .rail { padding: 10px 8px; overflow: hidden; }
    .rail-section { display: none; }
    .rail-foot { display: none; }
    .brandmark { width: calc(60px - 18px); }
    .brandmark .name { display: none; }
    .rail-item { justify-content: center; padding: 10px 0; gap: 0; }
    .rail-item > span:not([class]) { display: none; }
    .rail-item .count { display: none; }
    .switch-patient .sp-label { display: none; }
    .switch-patient .sp-kbd  { display: none; }
    .switch-patient { padding: 0 8px; min-width: 36px; }
    .calc-grid { grid-template-columns: 1fr 1fr !important; }
    .work-inner { padding: 14px 14px 40px; }
  }

  /* ============ MOBILE: ≤767px ============ */
  @media (max-width: 767px) {
    :root { --rail-w: 0px; --header-h: 52px; }

    /* Shell: 1-column, no rail */
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: var(--header-h) 1fr;
    }
    .rail { display: none; }

    /* Topbar: compact */
    .topbar { padding: 0 12px; gap: 8px; }
    .brandmark { width: auto; }
    .brandmark .name { font-size: 15px; }
    .topbar .pill { display: none; }
    .topbar .icon-btn { display: none; }
    .switch-patient .sp-label { display: none; }
    .switch-patient .sp-kbd  { display: none; }
    .switch-patient { padding: 0 8px; min-width: 36px; }
    /* User chip: avatar only */
    .user .name { display: none; }
    .user .role { display: none; }
    .user { padding: 3px; border-radius: 999px; }

    /* Work area: pad bottom for tab bar + iOS home indicator */
    .work-inner {
      padding: 10px 12px calc(68px + env(safe-area-inset-bottom, 0px));
    }

    /* Patient strip: 2×3 grid */
    .patient-strip {
      grid-template-columns: 1fr 1fr;
    }
    .patient-strip > div {
      border-right: none;
      border-bottom: 1px solid var(--line-2);
    }
    .patient-strip > div:nth-child(odd) {
      border-right: 1px solid var(--line-2);
    }
    .patient-strip > div:nth-child(5),
    .patient-strip > div:nth-child(6) {
      border-bottom: none;
    }
    .patient-strip .val { font-size: 14px; }
    .patient-strip .lbl { height: 22px; font-size: 9px; }

    /* Layout: single column everywhere */
    .calc-grid { grid-template-columns: 1fr !important; }
    .row-3 { grid-template-columns: 1fr 1fr; }

    /* Page head: stack */
    .page-head {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }
    .page-head h1 { font-size: 17px; }
    .page-head > div:last-child { display: flex; gap: 6px; width: 100%; }
    .page-head > div:last-child .btn { flex: 1; justify-content: center; font-size: 13px; }

    /* Metric tiles: 2 col */
    .metric-tiles-4 { grid-template-columns: 1fr 1fr !important; }
    .metric .val { font-size: 24px; }

    /* Tables: let card scroll */
    .card { overflow-x: auto; }

    /* ── Calculator: fix all inner grids ── */
    /* TwoCol (Steps 3/4/5): inputs+tiles → stack vertically */
    .two-col { grid-template-columns: 1fr !important; }
    /* Step 1: 5-col inputs → 2-col */
    .s1-grid { grid-template-columns: 1fr 1fr !important; }
    /* Step 2 sub-rows: 3-col → 2-col */
    .s2-aa-row  { grid-template-columns: 1fr 1fr !important; }
    .s2-lip-row { grid-template-columns: 1fr 1fr !important; }
    /* Bottom (energy+alerts+save): 3-col → 1-col */
    .calc-bottom { grid-template-columns: 1fr !important; }
    /* SaltRow: 1.6fr 1fr 90px → 1fr 80px (hide = total col, shown in readout below) */
    .salt-row-grid { grid-template-columns: 1fr 80px !important; gap: 6px !important; }
    .salt-row-grid > div:nth-child(3) { display: none !important; }
    /* Step 2 card-h: wrap route+Osm to new line */
    .step2-card-h { flex-wrap: wrap; padding: 10px 12px; gap: 6px; }
    .step2-ctrl { width: 100%; margin-left: 0 !important; order: 10; }
    .step2-ctrl .seg button { font-size: 11px; padding: 6px 10px; }

    /* Picker → bottom sheet */
    .picker {
      width: 100vw !important;
      max-height: 82vh;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
    }
    .picker-backdrop { align-items: flex-end; }

    /* Card body: less padding */
    .card-b { padding: 10px; }
    .card-h { padding: 11px 12px; }

    /* Disclaimer */
    .disclaimer-bar { font-size: 11px; padding: 6px 10px; }

    /* Seg control: full width */
    .seg { width: 100%; }
    .seg button { flex: 1; padding: 8px 6px; font-size: 12px; }

    /* PresetChips: slightly larger tap targets */
    .preset-chip { padding: 6px 14px; font-size: 13px; }

    /* Bottom nav visible */
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(58px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--surface);
      border-top: 1.5px solid var(--line);
      z-index: 40;
      box-shadow: 0 -2px 12px oklch(20% 0.01 230 / .06);
    }

    .bnav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 4px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--ink-4);
      font-size: 10px;
      font-weight: 500;
      font-family: inherit;
      transition: color .1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      min-height: 58px;
    }
    .bnav-item.active { color: var(--brand); }
    .bnav-item.active svg { stroke: var(--brand) !important; }

    .bnav-badge {
      position: absolute;
      top: 6px;
      right: calc(50% - 20px);
      background: var(--crit);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 3px;
      border: 1.5px solid var(--surface);
      pointer-events: none;
    }

    /* ── iOS: prevent auto-zoom on input focus (requires font-size ≥ 16px) ── */
    .inp, .sel { font-size: 16px !important; }

    /* ── Touch targets: minimum 44px on all interactive elements ── */
    .btn       { min-height: 44px; }
    .btn.sm    { min-height: 44px; font-size: 13px; padding: 6px 12px; }
    .seg button { min-height: 44px; }

    /* ── Active/pressed feedback for tappable surfaces ── */
    .card-h.clickable:active { background: var(--bg-2); }
    .preset-chip:active      { opacity: .7; transform: scale(0.97); }
    .rail-item:active        { background: var(--bg-2); }
    .btn:active              { opacity: .85; }

    /* ── Registry: hide table, show card list ── */
    .patient-table { display: none !important; }
    .patient-card-list { display: flex; flex-direction: column; gap: 10px; }
    .patient-mc {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s, border-color .15s, background .15s;
    }
    .patient-mc:active { transform: scale(0.99); background: var(--bg-2); }
    .patient-mc.active { border-color: var(--brand); background: var(--brand-bg); }
    .patient-mc .pmc-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .patient-mc .pmc-head { justify-content: space-between; }
    .patient-mc .pmc-name { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
    .patient-mc .pmc-meta { font-size: 12.5px; color: var(--ink-2); font-family: "IBM Plex Mono", monospace; }
    .patient-mc .pmc-diagnosis { font-size: 12.5px; color: var(--ink-2); line-height: 1.35; }
    .patient-mc .pmc-stats { font-size: 12px; color: var(--ink-2); gap: 14px; font-family: "IBM Plex Mono", monospace; }
    .patient-mc .pmc-lbl { color: var(--ink-3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 2px; }
    .patient-mc .pmc-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 2px; }
    .patient-mc .pmc-actions .btn { width: 100%; justify-content: center; min-height: 40px; }

    /* ── Trend graph: stack controls, scrollable chips with snap ── */
    .trend-controls > div:first-child { width: 100%; }
    .trend-controls > div:last-child { width: 100%; justify-content: flex-start; margin-left: 0 !important; }
    .trend-chips {
      flex-wrap: nowrap !important;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
      margin: 0 -4px;
      padding-left: 4px; padding-right: 4px;
    }
    .trend-chips::-webkit-scrollbar { height: 4px; }
    .trend-chips::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }
    .trend-chips > button {
      flex-shrink: 0 !important;
      min-height: 38px;
      padding: 8px 14px !important;
      font-size: 13px !important;
      scroll-snap-align: start;
    }

    /* ── Trend graph: Latest/Target/Δ stack as 2-col grid on mobile ── */
    .trend-latest > div { padding-right: 0; }
    .trend-latest > div::after { display: none !important; }
    .trend-latest {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 12px !important;
      align-items: flex-start !important;
    }
    .trend-latest > div:first-child { grid-column: 1 / -1; }

    /* ── Patient strip: identity row spans both columns on mobile ── */
    .patient-strip > div:nth-child(1) {
      grid-column: 1 / -1;
      border-right: none;
    }
    .patient-strip > div:nth-child(3),
    .patient-strip > div:nth-child(5) {
      border-right: none !important;
    }

    /* ── Alert row: stack acknowledge button below content ── */
    .alert-row { flex-wrap: wrap; }
    .alert-row > .btn { width: 100%; margin-top: 6px; justify-content: center; }

    /* ── Calculator save bar: sticky above bottom-nav on mobile ── */
    .calc-save-bar {
      position: sticky;
      bottom: calc(58px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(to top, var(--surface) 80%, oklch(99% 0.002 230 / 0));
      padding: 10px 0 8px;
      margin: 0 -10px -10px;
      padding-left: 10px; padding-right: 10px;
      z-index: 10;
      box-shadow: 0 -1px 0 var(--line-2);
    }
    .calc-save-bar .btn { min-height: 44px; }

    /* ── Bottom nav badge: tucked above icon, off-center to right ── */
    .bnav-badge {
      top: 4px !important;
      right: auto !important;
      left: calc(50% + 6px);
    }

    /* ── Modal safe-area padding ── */
    .picker { padding-bottom: env(safe-area-inset-bottom, 0px); }
  }

  /* ============ PRINT STYLES ============ */
  @media print {
    /* Hide all UI — show only Ramathibodi print form */
    .topbar, .rail, .tweaks-panel, #toast-host, .picker-backdrop,
    .switch-patient, .patient-strip, .page-head, .disclaimer-bar,
    .card, .step-summary, .preset-chips { display: none !important; }

    html, body { height: auto; background: #fff; }
    .app { display: block; height: auto; min-height: auto; overflow: visible; }
    .work { overflow: visible; }
    .work-inner { padding: 0; max-width: 100%; }

    /* Show the print form */
    #print-form { display: block !important; }

    @page { size: A4 portrait; margin: 8mm 10mm; }
  }
